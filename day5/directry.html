<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Directory</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <style>
        /* ==========================
   GENERAL
========================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f7fb;
}

/* ==========================
   HEADER
========================== */

header{
    background:linear-gradient(135deg,#ff1b1b,#e54646);
}

header h1{
    font-weight:bold;
}

header p{
    margin-top:10px;
    font-size:18px;
}

/* ==========================
   SEARCH BOX
========================== */

#searchBox{
    border-radius:30px;
    padding:15px;
    border:2px solid #fd0d0d;
}

#searchBox:focus{
    box-shadow:0 0 10px rgba(253, 13, 13, 0.4);
}

/* ==========================
   STUDENT CARD
========================== */

.student-card{
    transition:.3s;
    margin-bottom:25px;
}

.student-card:hover{
    transform:translateY(-8px);
}

.card{
    border:none;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 8px 18px rgba(0,0,0,.15);
}

/* Alternate Colors */

.even-card{
    background:#ffffff;
}

.odd-card{
    background:#eef6ff;
}

/* Image */
/* 
.card img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    margin:20px auto 10px;
    border:4px solid #fd0d0d;
} */

/* Name */

.card-title{
    font-weight:bold;
    color:#fd0d0d;
}

/* Branch */

.branch{
    color:#555;
    font-weight:bold;
}

/* CGPA */

.cgpa-high{
    background:rgb(9, 0, 128);
}

.cgpa-low{
    background:rgb(0, 255, 0);
}

/* Details */

.details{
    display:none;
    border-top:1px solid #ddd;
    margin-top:15px;
    padding-top:15px;
}

/* Button */

.btn-details{
    width:100%;
    border-radius:25px;
}

/* Student Count */

#studentCount{
    font-size:18px;
}

/* Footer */

footer{
    margin-top:50px;
}

/* Responsive */

@media(max-width:768px){

    /* .card img{
        width:100px;
        height:100px;
    } */

    header h1{
        font-size:28px;
    }

}
    </style>
</head>

<body>

    <!-- Header -->
    <header class="bg-primary text-white text-center py-4">
        <div class="container">
            <h1>📘 Student Directory</h1>
            <p>Dynamic Student Directory using JavaScript & jQuery</p>
        </div>
    </header>

    <!-- Search -->
    <section class="container my-4">

        <div class="row">

            <div class="col-md-8 mx-auto">

                <input
                    type="text"
                    id="searchBox"
                    class="form-control form-control-lg"
                    placeholder="Search Student by Name...">

            </div>

        </div>

    </section>

    <!-- Total Students -->
    <section class="container mb-3">

        <h5>
            Total Students :
            <span class="badge bg-success" id="studentCount">0</span>
        </h5>

    </section>

    <!-- Student Cards -->
    <section class="container">

        <div class="row" id="studentContainer">

            <!-- Cards will come from JavaScript -->

        </div>

    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3 mt-5">

        © 2026 Student Directory | Made with HTML, CSS, JavaScript & jQuery

    </footer>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JavaScript -->
    <script src="script.js"></script>

    <!-- jQuery File -->
    <script>
        // ===============================
// Student Data
// ===============================

const students = [

{
    name: "Aashita Singh",
    branch: "CSE",
    year: "1st Year",
    cgpa: 8.7,
    city: "Jaipur",
    skills: ["HTML", "CSS", "JavaScript"],
    hobbies: ["Reading", "Drawing"],
    
},

{
    name: "Rahul Sharma",
    branch: "IT",
    year: "2nd Year",
    cgpa: 7.6,
    city: "Delhi",
    skills: ["Python", "C++"],
    hobbies: ["Gaming", "Cricket"],
},

{
    name: "Priya Verma",
    branch: "ECE",
    year: "3rd Year",
    cgpa: 9.1,
    city: "Mumbai",
    skills: ["Java", "SQL"],
    hobbies: ["Music", "Dance"],
},

{
    name: "Aman Gupta",
    branch: "ME",
    year: "2nd Year",
    cgpa: 8.0,
    city: "Kota",
    skills: ["AutoCAD", "C"],
    hobbies: ["Football", "Travel"],

},

{
    name: "Sneha Patel",
    branch: "AI & DS",
    year: "1st Year",
    cgpa: 9.4,
    city: "Ahmedabad",
    skills: ["Python", "Machine Learning"],
    hobbies: ["Photography", "Cooking"],
}

];

// ===============================
// Display Student Count
// ===============================

document.getElementById("studentCount").innerText = students.length;

// ===============================
// Function to Display Cards
// ===============================

function displayStudents(studentArray){

    let output = "";

    studentArray.forEach(function(student,index){

        let badge =
            student.cgpa >= 8
            ? "bg-success"
            : "bg-warning";

        let cardColor =
            index % 2 == 0
            ? "even-card"
            : "odd-card";

        output += `

        <div class="col-md-4 student-card">

            <div class="card ${cardColor} p-3 text-center">
                <h4 class="card-title">${student.name}</h4>

                <p class="branch">${student.branch}</p>

                <p>${student.year}</p>

                <span class="badge ${badge}">
                    CGPA : ${student.cgpa}
                </span>

                <button class="btn btn-primary btn-details mt-3">
                    Show Details
                </button>

                <div class="details">

                    <hr>

                    <p><b>City :</b> ${student.city}</p>

                    <p><b>Skills :</b> ${student.skills.join(", ")}</p>

                    <p><b>Hobbies :</b> ${student.hobbies.join(", ")}</p>

                </div>

            </div>

        </div>

        `;

    });

    document.getElementById("studentContainer").innerHTML = output;

}

// ===============================
// Initial Display
// ===============================

displayStudents(students);

// ===============================
// Search Student
// ===============================

document.getElementById("searchBox").addEventListener("keyup", function(){

    let search = this.value.toLowerCase();

    let filtered = students.filter(function(student){

        return student.name.toLowerCase().includes(search);

    });

    displayStudents(filtered);

});
    </script>

</body>

</html>
