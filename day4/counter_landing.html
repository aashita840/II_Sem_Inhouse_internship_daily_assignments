<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeSprint</title>
    <style>*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    transition:0.4s;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 8%;
    background:#111827;
    position:sticky;
    top:0;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    transition:.3s;
}

nav a:hover{
    color:#38bdf8;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:#06b6d4;
    color:white;
    cursor:pointer;
    transition:.3s;
    font-size:16px;
}

button:hover{
    background:#0891b2;
    transform:scale(1.05);
}

.hero{
    text-align:center;
    padding:80px 20px;
}

.hero h2{
    font-size:45px;
    color:#22d3ee;
    margin-bottom:20px;
}

.hero p{
    font-size:20px;
    margin-bottom:30px;
}

.counter,
.join{
    width:80%;
    max-width:700px;
    margin:40px auto;
    background:#1e293b;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 15px rgba(0,255,255,.2);
}

.counter h2,
.join h2{
    margin-bottom:20px;
    color:#22d3ee;
}

.counter h3{
    margin:20px 0;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    font-size:16px;
}

small{
    display:block;
    color:#ff6b6b;
    text-align:left;
    margin-bottom:10px;
}

footer{
    text-align:center;
    padding:20px;
    background:#111827;
    margin-top:50px;
}

.light{
    background:#f4f4f4;
    color:#111;
}

.light header,
.light footer{
    background:#ffffff;
    color:#111;
}

.light nav a{
    color:#111;
}

.light .counter,
.light .join{
    background:#ffffff;
    color:#111;
}

.light .hero h2{
    color:#0f766e;
}
</style>
</head>

<body>

    <header>
        <h1 id="title"> CodeSprint</h1>

        <nav>
            <a href="#">Home</a>
            <a href="#">Features</a>
            <a href="#">Events</a>
            <a href="#">Join</a>
        </nav>

        <button id="themeBtn"> Light Mode</button>
    </header>

    <section class="hero">

        <h2 id="heading">Welcome to CodeSprint</h2>

        <p>
            Learn HTML, CSS & JavaScript by building real projects.
        </p>

        <button id="changeHeading">
            Change Heading
        </button>

    </section>

    <section class="counter">

        <h2> Coding Click Counter</h2>

        <h3>Total Clicks :
            <span id="count">0</span>
        </h3>

        <button id="clickBtn">
            Click Me
        </button>

        <button id="resetBtn">
            Reset
        </button>

    </section>

    <section class="join">

        <h2>Join CodeSprint</h2>

        <form id="myForm">

            <input type="text"
                   id="name"
                   placeholder="Enter Your Name">

            <small id="nameError"></small>

            <input type="email"
                   id="email"
                   placeholder="Enter Email">

            <small id="emailError"></small>

            <button type="submit">
                Register
            </button>

        </form>

    </section>

    <footer>

        <p>© 2026 CodeSprint | Learn • Build • Grow</p>

    </footer>

    <script>
        // =========================
// Dynamic Heading
// =========================

const heading = document.getElementById("heading");
const changeHeading = document.getElementById("changeHeading");

changeHeading.addEventListener("click", function () {
    heading.innerHTML = " Build. Code. Innovate.";
});

// =========================
// Dark Mode Toggle
// =========================

const themeBtn = document.getElementById("themeBtn");

themeBtn.addEventListener("click", function () {

    document.body.classList.toggle("light");

    if (document.body.classList.contains("light")) {
        themeBtn.innerHTML = " Dark Mode";
    } else {
        themeBtn.innerHTML = " Light Mode";
    }

});

// =========================
// Click Counter
// =========================

let count = 0;

const countText = document.getElementById("count");

document.getElementById("clickBtn").addEventListener("click", function () {

    count++;

    countText.innerHTML = count;

});

document.getElementById("resetBtn").addEventListener("click", function () {

    count = 0;

    countText.innerHTML = count;

});

// =========================
// Form Validation
// =========================

const form = document.getElementById("myForm");

form.addEventListener("submit", function (e) {

    e.preventDefault();

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();

    let nameError = document.getElementById("nameError");
    let emailError = document.getElementById("emailError");

    nameError.innerHTML = "";
    emailError.innerHTML = "";

    let valid = true;

    if (name === "") {
        nameError.innerHTML = "Please enter your name.";
        valid = false;
    }

    if (email === "") {
        emailError.innerHTML = "Please enter your email.";
        valid = false;
    } else if (!email.includes("@")) {
        emailError.innerHTML = "Email must contain @.";
        valid = false;
    }

    if (valid) {
        alert(" Registration Successful!");

        form.reset();
    }

});
    </script>

</body>

</html>
